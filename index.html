<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Polski dla trenera — с нуля до A2</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#2e7d4f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Polski">
<style>
  :root{
    --bg:#f6f3ee; --card:#ffffff; --ink:#26221c; --muted:#8a8177;
    --accent:#2e7d4f; --accent2:#d96c2c; --line:#e7e0d6;
    --good:#2e7d4f; --bad:#c0392b; --radius:16px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45}
  header{position:sticky;top:0;z-index:5;background:var(--bg);border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:10px}
  header h1{font-size:17px;margin:0;flex:1;cursor:pointer}
  header h1 span{color:var(--accent)}
  .toggle{font-size:13px;color:var(--muted);cursor:pointer;user-select:none}
  .toggle.on{color:var(--accent);font-weight:600}
  main{max-width:760px;margin:0 auto;padding:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;cursor:pointer;transition:transform .08s}
  .card:hover{transform:translateY(-2px)}
  .card .emoji{font-size:26px}
  .card h3{margin:8px 0 4px;font-size:15px}
  .card p{margin:0;font-size:13px;color:var(--muted)}
  .bar{height:6px;background:var(--line);border-radius:3px;margin-top:10px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--accent);border-radius:3px}
  .crumbs{font-size:13px;color:var(--muted);margin-bottom:10px;cursor:pointer}
  .crumbs:hover{color:var(--accent)}
  .modes{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:12px}
  .lesson-head h2{margin:4px 0 2px}
  .lesson-head p{margin:0;color:var(--muted);font-size:14px}
  .grammar{background:#fdf9f0;border:1px solid #eadfc8;border-radius:var(--radius);padding:14px 16px;margin-top:16px;font-size:14px}
  .grammar h4{margin:0 0 8px;color:var(--accent2)}
  .grammar table{border-collapse:collapse;margin:6px 0}
  .grammar td{padding:2px 12px 2px 0}
  .big-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:26px 20px;text-align:center;margin-top:14px}
  .pl{font-size:26px;font-weight:700}
  .tr{font-size:14px;color:var(--muted);margin-top:4px}
  .ru{font-size:19px;color:var(--accent);margin-top:12px;min-height:26px}
  .btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}
  button{font:inherit;border:none;border-radius:12px;padding:10px 18px;cursor:pointer;background:var(--line);color:var(--ink)}
  button.primary{background:var(--accent);color:#fff}
  button.warn{background:var(--accent2);color:#fff}
  button.ghost{background:transparent;border:1px solid var(--line)}
  button:disabled{opacity:.45;cursor:default}
  .speak-btn{font-size:20px;background:transparent;border:1px solid var(--line);border-radius:50%;width:46px;height:46px;padding:0}
  .speak-big{font-size:34px;background:var(--accent);color:#fff;border-radius:50%;width:78px;height:78px;padding:0}
  .meta{font-size:13px;color:var(--muted);margin-top:10px}
  .opt{display:block;width:100%;text-align:left;margin-top:8px;background:var(--card);border:1px solid var(--line);font-size:16px;padding:11px 14px}
  .opt.correct{background:#e6f4ec;border-color:var(--good);color:var(--good);font-weight:600}
  .opt.wrong{background:#faeae7;border-color:var(--bad);color:var(--bad)}
  .tiles{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px;min-height:44px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 14px;font-size:17px;cursor:pointer}
  .tile.used{opacity:.25;pointer-events:none}
  .answer-zone{border:2px dashed var(--line);border-radius:12px;min-height:52px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;padding:8px;margin-top:14px}
  .answer-zone .tile{background:#eef6f0;border-color:var(--accent)}
  .mic{width:84px;height:84px;border-radius:50%;font-size:36px;background:var(--accent2);color:#fff;box-shadow:0 4px 14px rgba(217,108,44,.35)}
  .mic.listening{background:var(--bad);animation:pulse 1.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(192,57,43,.5)}70%{box-shadow:0 0 0 18px rgba(192,57,43,0)}100%{box-shadow:0 0 0 0 rgba(192,57,43,0)}}
  .verdict{font-size:17px;font-weight:600;margin-top:14px;min-height:24px}
  .verdict.good{color:var(--good)} .verdict.bad{color:var(--bad)}
  .heard{font-size:14px;color:var(--muted);margin-top:6px;min-height:20px}
  .alpha{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:8px;margin-top:12px}
  .alpha .card{padding:10px;text-align:center}
  .alpha .l{font-size:22px;font-weight:700}
  .alpha .s{font-size:12px;color:var(--muted)}
  .note{background:#eef3fb;border:1px solid #d5e0f3;border-radius:var(--radius);padding:12px 16px;font-size:13px;color:#3b5578;margin-top:16px}
  .score{font-size:40px;font-weight:800;color:var(--accent)}
  input.answer{font:inherit;font-size:18px;width:100%;max-width:420px;padding:11px 14px;border:1px solid var(--line);border-radius:12px;margin-top:14px;text-align:center}
  input.answer:focus{outline:2px solid var(--accent)}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
  .pair{width:100%;text-align:center;background:var(--card);border:1px solid var(--line);font-size:15px;padding:11px 8px;margin-top:0}
  .pair.sel{outline:2px solid var(--accent2);background:#fdf3ec}
  .pair.done{opacity:.28;pointer-events:none;background:#e6f4ec}
  .pair.err{background:#faeae7;border-color:var(--bad)}
  .mistakes{text-align:left;margin-top:16px;font-size:14px}
  .mistakes div{padding:6px 0;border-bottom:1px dashed var(--line)}
  .gap-phrase{font-size:23px;font-weight:700;letter-spacing:.3px}
  .exam-card{background:linear-gradient(135deg,#2e7d4f,#1f5c39);color:#fff}
  .exam-card p,.exam-card h3{color:#fff}
  .badge{display:inline-block;font-size:11px;background:var(--accent2);color:#fff;border-radius:8px;padding:2px 8px;margin-left:6px;vertical-align:middle}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:24px}
  .stats-strip{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
  .stat-item{text-align:center;flex:1;min-width:72px}
  .stat-item .num{font-size:21px;font-weight:800;color:var(--accent)}
  .stat-item .lbl{font-size:11px;color:var(--muted)}
  h3.sec{margin:22px 0 10px}
  .chat{display:flex;flex-direction:column;gap:10px;margin-top:14px;text-align:left}
  .bub{max-width:85%;padding:10px 14px;border-radius:14px;font-size:16px}
  .bub .bru{font-size:12px;color:var(--muted);margin-top:3px}
  .bub.other{background:var(--bg);border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:4px}
  .bub.me{background:#e6f4ec;border:1px solid #bcdcc9;align-self:flex-end;border-bottom-right-radius:4px}
  .bub.me .bru{color:#5b8a6d}
  .opt .oru{display:block;font-size:12px;color:var(--muted);margin-top:2px}
  .note-inline{font-size:13px;color:#3b5578;background:#eef3fb;border-radius:10px;padding:8px 12px;margin-top:12px;text-align:left}
</style>
</head>

const NUM_ONES = ['zero','jeden','dwa','trzy','cztery','pięć','sześć','siedem','osiem','dziewięć','dziesięć','jedenaście','dwanaście','trzynaście','czternaście','piętnaście','szesnaście','siedemnaście','osiemnaście','dziewiętnaście'];
const NUM_TENS = ['','','dwadzieścia','trzydzieści','czterdzieści','pięćdziesiąt','sześćdziesiąt','siedemdziesiąt','osiemdziesiąt','dziewięćdziesiąt'];
const NUM_HUNDREDS = ['','sto','dwieście','trzysta','czterysta','pięćset'];
function numToPl(n){
  if (n < 20) return NUM_ONES[n];
  if (n < 100){
    const t = NUM_TENS[Math.floor(n / 10)];
    return n % 10 ? t + ' ' + NUM_ONES[n % 10] : t;
  }
  const h = NUM_HUNDREDS[Math.floor(n / 100)];
  return n % 100 ? h + ' ' + numToPl(n % 100) : h;
}
function zloty(n){
  const t = n % 10, h = n % 100;
  const f = n === 1 ? 'złoty' : (t >= 2 && t <= 4 && (h < 12 || h > 14)) ? 'złote' : 'złotych';
  return numToPl(n) + ' ' + f;
}

/* Мягкие согласные dzi/ci/si/zi/ni + гласная дают йотированную гласную: dzie=дже, nie=не, cia=ча */
const SOFT_CONS = [['dzi','дж'],['ci','ч'],['si','щ'],['zi','ж'],['ni','н']];
const SOFT_VOWELS = [['ą','ён'],['ę(?=$|[\\s.,!?])','е'],['ę','ен'],['a','я'],['e','е'],['o','ё'],['ó','ю'],['u','ю']];
const TRANSLIT = (() => {
  const rules = [
    [/szcz/g,'щ'],[/sz/g,'ш'],[/cz/g,'ч'],[/rz/g,'ж'],
    [/dż/g,'дж'],[/dź/g,'джь'],
  ];
  for (const [lat, cyr] of SOFT_CONS){
    for (const [lv, cv] of SOFT_VOWELS) rules.push([new RegExp(lat + lv, 'g'), cyr + cv]);
    rules.push([new RegExp(lat, 'g'), cyr + 'и']);
  }
  rules.push(
    [/dz/g,'дз'],[/ch/g,'х'],
    [/ż/g,'ж'],[/ź/g,'зь'],[/ś/g,'щ'],[/ć/g,'чь'],[/ń/g,'нь'],
    [/ł/g,'ў'],[/w/g,'в'],
    [/ją/g,'ён'],[/ję(?=$|[\s.,!?])/g,'е'],[/ję/g,'ен'],[/ja/g,'я'],[/je/g,'е'],[/jo/g,'ё'],[/ju/g,'ю'],[/jó/g,'ю'],[/j/g,'й'],
    [/ią/g,'ён'],[/ię(?=$|[\s.,!?])/g,'е'],[/ię/g,'ен'],[/ia/g,'я'],[/ie/g,'е'],[/io/g,'ё'],[/iu/g,'ю'],[/ió/g,'ю'],
    [/lą/g,'лён'],[/lę(?=$|[\s.,!?])/g,'ле'],[/lę/g,'лен'],[/la/g,'ля'],[/le/g,'ле'],[/lo/g,'лё'],[/lu/g,'лю'],[/ló/g,'лю'],[/li/g,'ли'],[/l/g,'ль'],
    [/ą/g,'он'],[/ę(?=$|[\s.,!?])/g,'э'],[/ę/g,'эн'],
    [/ó/g,'у'],[/y/g,'ы'],[/c/g,'ц'],[/h/g,'х'],[/e/g,'э'],
    [/a/g,'а'],[/b/g,'б'],[/d/g,'д'],[/f/g,'ф'],[/g/g,'г'],[/i/g,'и'],[/k/g,'к'],
    [/m/g,'м'],[/n/g,'н'],[/o/g,'о'],[/p/g,'п'],[/r/g,'р'],[/s/g,'с'],[/t/g,'т'],
    [/u/g,'у'],[/z/g,'з']
  );
  return rules;
})();
function translit(pl){
  let s = pl.toLowerCase();
  for (const [re, sub] of TRANSLIT) s = s.replace(re, sub);
  return s;
}

let plVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  plVoice = vs.find(v => v.lang && v.lang.toLowerCase().startsWith('pl')) || null;
}
if ('speechSynthesis' in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text, rate){
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'pl-PL';
  if (plVoice) u.voice = plVoice;
  u.rate = rate || 0.85;
  speechSynthesis.speak(u);
}
/* Кнопки озвучки: обычная + медленная 🐢 */
function speakBtns(text){

    <button class="speak-btn" onclick="speak('${esc(text)}', 0.55)" title="Медленно">🐢</button>`;
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function levenshtein(a, b){
  const m = a.length, n = b.length;
  if (!m) return n; if (!n) return m;
  let prev = Array.from({length: n+1}, (_, i) => i);
  for (let i = 1; i <= m; i++){
    const cur = [i];
    for (let j = 1; j <= n; j++){
      cur[j] = Math.min(prev[j] + 1, cur[j-1] + 1, prev[j-1] + (a[i-1] === b[j-1] ? 0 : 1));
    }
    prev = cur;
  }
  return prev[n];
}
function norm(s){
  return s.toLowerCase().replace(/[.,!?ʼ'"«»-]/g,'').replace(/\s+/g,' ').trim();
}
const DIA = {'ą':'a','ć':'c','ę':'e','ł':'l','ń':'n','ó':'o','ś':'s','ź':'z','ż':'z'};
function stripDia(s){ return s.replace(/[ąćęłńóśźż]/g, ch => DIA[ch]); }
function similarity(a, b){
  a = norm(a); b = norm(b);
  if (!a || !b) return 0;
  return 1 - levenshtein(a, b) / Math.max(a.length, b.length);
}
function tokens(s){ return s.replace(/[.,!?«»]/g,'').trim().split(/\s+/); }
function isPhrase(pl){ return tokens(pl).length >= 3; }

const LS_KEY = 'polskiTrener';
const MODES = ['learn','quiz','listen','build','match','speak'];
function loadProgress(){

function setStat(lessonId, mode, value){
  const p = loadProgress();

  p[lessonId][mode] = Math.max(p[lessonId][mode] || 0, Math.min(100, Math.round(value)));

}

/* ============================================================
   SRS: интервальные повторения, слабые слова, стрик
   Ящики Лейтнера: верно → ящик выше, ошибка → ящик 1.
   ============================================================ */

const WK = 'polskiTrenerWords', DK = 'polskiTrenerDays';
const BOX_DAYS = [1, 2, 4, 7, 15];
const DAY_MS = 864e5;
const ALL_BY_PL = new Map(ALL_WORDS.map(w => [w.pl, w]));
function loadWS(){ try { return JSON.parse(localStorage.getItem(WK)) || {}; } catch(e){ return {}; } }
function saveWS(s){ localStorage.setItem(WK, JSON.stringify(s)); }
function todayKey(t){ return new Date(t || Date.now()).toLocaleDateString('sv'); }
function bumpDay(){
  let d; try { d = JSON.parse(localStorage.getItem(DK)) || {}; } catch(e){ d = {}; }
  const k = todayKey();
  d[k] = (d[k] || 0) + 1;
  localStorage.setItem(DK, JSON.stringify(d));
}
function recordSeen(w){
  if (!ALL_BY_PL.has(w.pl)) return;
  const s = loadWS();
  if (!s[w.pl]) s[w.pl] = {box: 1, due: Date.now() + DAY_MS, err: 0, ok: 0};
  saveWS(s); bumpDay();
}
function recordAnswer(w, correct){
  if (!ALL_BY_PL.has(w.pl)) return;
  const s = loadWS();
  const st = s[w.pl] || {box: 1, due: 0, err: 0, ok: 0};
  if (correct){ st.ok++; st.box = Math.min(st.box + 1, 5); }
  else { st.err++; st.box = 1; }
  st.due = Date.now() + BOX_DAYS[st.box - 1] * DAY_MS;
  s[w.pl] = st;
  saveWS(s); bumpDay();
}
function dueWords(){
  const s = loadWS(), now = Date.now();
  return Object.keys(s).filter(pl => s[pl].due <= now).map(pl => ALL_BY_PL.get(pl)).filter(Boolean);
}
function weakWords(){
  const s = loadWS();
  return Object.keys(s).filter(pl => s[pl].err > 0 && s[pl].err >= s[pl].ok)
    .sort((a, b) => (s[b].err - s[b].ok) - (s[a].err - s[a].ok))
    .map(pl => ALL_BY_PL.get(pl)).filter(Boolean);
}
function srsCounts(){
  const s = loadWS();
  const keys = Object.keys(s);
  return { inWork: keys.length, learned: keys.filter(k => s[k].box >= 4).length, due: dueWords().length };
}
function streak(){
  let d; try { d = JSON.parse(localStorage.getItem(DK)) || {}; } catch(e){ d = {}; }
  let n = 0;
  for (let t = Date.now();; t -= DAY_MS){
    const k = todayKey(t);
    if (d[k]) n++;
    else if (n === 0 && k === todayKey()) continue;  // сегодня ещё не занималась — серия не рвётся
    else break;
  }
  return n;
}

}
function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function esc(s){ return s.replace(/"/g,'&quot;'); }

/* Обманки: самые похожие на правильный ответ слова из пула */
function distractors(w, pool, field, k){
  const seen = new Set([w[field]]);
  const cands = pool.filter(x => {
    if (x === w || seen.has(x[field])) return false;
    seen.add(x[field]);
    return true;
  });
  cands.sort((a, b) => similarity(b[field], w[field]) - similarity(a[field], w[field]));
  return shuffle(cands.slice(0, Math.max(k * 2, 8))).slice(0, k);
}

/* ============================================================
   РЕЖИМ 2: БОЛЬШОЙ СМЕШАННЫЙ ТЕСТ
   типы: mc_pl_ru, mc_ru_pl, audio_mc, type_pl, gap
   ============================================================ */

function makeQuestion(w, pool){
  const types = ['mc_pl_ru','mc_ru_pl','audio_mc','type_pl'];
  if (isPhrase(w.pl)) types.push('gap','gap');           // фразам чаще достаётся пропуск
  if (tokens(w.pl).length > 4) types.splice(types.indexOf('type_pl'), 1); // длинное не печатаем
  const type = types[Math.floor(Math.random() * types.length)];
  const q = {type, w};
  if (type === 'mc_pl_ru') q.options = shuffle([w, ...distractors(w, pool, 'ru', 5)]);
  else if (type === 'mc_ru_pl') q.options = shuffle([w, ...distractors(w, pool, 'pl', 5)]);
  else if (type === 'audio_mc') q.options = shuffle([w, ...distractors(w, pool, 'ru', 3)]);
  else if (type === 'gap'){
    const ws = tokens(w.pl);
    const cands = ws.filter(t => t.length >= 4);
    const gap = (cands.length ? cands : ws)[Math.floor(Math.random() * (cands.length ? cands.length : ws.length))];
    const allTok = [...new Set(pool.flatMap(x => tokens(x.pl).map(t => t.toLowerCase())))]
      .filter(t => !ws.map(x => x.toLowerCase()).includes(t) && Math.abs(t.length - gap.length) <= 3);
    allTok.sort((a, b) => similarity(b, gap) - similarity(a, gap));
    q.gap = gap;
    q.display = w.pl.replace(gap, '_____');
    q.options = shuffle([gap.toLowerCase(), ...shuffle(allTok.slice(0, 8)).slice(0, 3)]);
  }
  return q;
}
function genQuiz(pool, n){
  return shuffle(pool).slice(0, n).map(w => makeQuestion(w, pool));
}

function startQuiz(l){
  state.quiz = { qs: genQuiz(l.words, Math.min(20, l.words.length)), idx: 0, right: 0, mistakes: [], lesson: l, statKey: [l.id, 'quiz'] };
  renderQuestion();
}

  } else if (q.type === 'audio_mc'){
    body = `
      <div class="btns"><button class="speak-big" onclick="speak('${esc(q.w.pl)}')">🔊</button></div>
      <div class="meta">Текст скрыт — только на слух</div>
      <div style="margin-top:12px">${q.options.map((o, i) =>
        `<button class="opt" id="opt${i}" onclick="answerMC(${i})">${o.ru}</button>`).join('')}</div>`;
    setTimeout(() => speak(q.w.pl), 250);
  } else if (q.type === 'type_pl'){
    body = `
      <div class="pl" style="font-size:21px">${q.w.ru}</div>
      <input class="answer" id="typedInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="напиши по-польски (можно без ą, ł, ż…)">
      <div class="btns"><button class="primary" onclick="answerTyped()">Проверить</button></div>
      <div class="verdict" id="verdict"></div>`;
  } else if (q.type === 'gap'){
    body = `
      <div class="gap-phrase">${q.display}</div>
      <div class="ru" style="visibility:visible">${q.w.ru}</div>
      <div style="margin-top:12px">${q.options.map((o, i) =>
        `<button class="opt" id="opt${i}" onclick="answerGap(${i})" style="text-align:center">${o}</button>`).join('')}</div>`;
  }
  app.innerHTML = head + body + '</div>';
  const inp = document.getElementById('typedInput');
  if (inp){
    inp.focus();
    inp.onkeydown = e => { if (e.key === 'Enter') answerTyped(); };
  }
}
function lockOpts(){ document.querySelectorAll('.opt').forEach(b => b.onclick = null); }
function nextQuestion(delay){
  setTimeout(() => {
    const qz = state.quiz;
    qz.idx++;
    if (qz.idx >= qz.qs.length) return finishQuiz();
    renderQuestion();
  }, delay);
}
function answerMC(i){
  const qz = state.quiz;
  const q = qz.qs[qz.idx];
  lockOpts();
  const correctIdx = q.options.indexOf(q.w);
  document.getElementById('opt' + correctIdx).classList.add('correct');
  recordAnswer(q.w, q.options[i] === q.w);
  if (q.options[i] === q.w) qz.right++;
  else { document.getElementById('opt' + i).classList.add('wrong'); qz.mistakes.push(q.w); }
  if (q.type !== 'audio_mc') speak(q.w.pl);
  nextQuestion(1200);
}
function answerGap(i){
  const qz = state.quiz;
  const q = qz.qs[qz.idx];
  lockOpts();
  const correctIdx = q.options.indexOf(q.gap.toLowerCase());
  document.getElementById('opt' + correctIdx).classList.add('correct');
  recordAnswer(q.w, i === correctIdx);
  if (i === correctIdx){
    qz.right++;
    document.querySelector('.gap-phrase').textContent = q.w.pl;
  } else {
    document.getElementById('opt' + i).classList.add('wrong');
    qz.mistakes.push(q.w);
  }
  speak(q.w.pl);
  nextQuestion(1400);
}
function answerTyped(){
  const qz = state.quiz;
  const q = qz.qs[qz.idx];
  const inp = document.getElementById('typedInput');
  if (!inp || inp.disabled) return;
  inp.disabled = true;
  const got = norm(inp.value), want = norm(q.w.pl);
  const v = document.getElementById('verdict');
  const exact = got === want;
  const noDia = stripDia(got) === stripDia(want);
  const close = similarity(stripDia(got), stripDia(want)) >= 0.9;
  recordAnswer(q.w, exact || noDia || close);
  if (exact){
    qz.right++;
    v.textContent = '✅ Идеально!';
    v.className = 'verdict good';
  } else if (noDia || close){
    qz.right++;
    v.textContent = '✅ Верно! Точное написание: ' + q.w.pl;
    v.className = 'verdict good';
  } else {
    v.textContent = '❌ Правильно: ' + q.w.pl;
    v.className = 'verdict bad';
    qz.mistakes.push(q.w);
  }
  speak(q.w.pl);
  nextQuestion(exact ? 1200 : 2200);
}
function finishQuiz(){
  const qz = state.quiz;
  const pct = Math.round(qz.right / qz.qs.length * 100);
  setStat(qz.statKey[0], qz.statKey[1], pct);
  const mist = qz.mistakes.length
    ? `<div class="mistakes"><b>Повтори эти:</b>${qz.mistakes.map(w =>
        `<div>🔊 <span style="cursor:pointer" onclick="speak('${esc(w.pl)}')"><b>${w.pl}</b></span> — ${w.ru}</div>`).join('')}</div>`
    : '<div class="verdict good">Без единой ошибки! 🥇</div>';
  const retry = qz.lesson
    ? `<button onclick="go('mode','${qz.lesson.id}','quiz')">Ещё раз</button>
       <button class="primary" onclick="go('mode','${qz.lesson.id}','listen')">Аудирование →</button>`
    : qz.isReview
    ? `<button onclick="go('review')">Ещё раз</button>
       <button class="primary" onclick="go('home')">К урокам</button>`
    : `<button onclick="go('exam')">Ещё раз</button>
       <button class="primary" onclick="go('home')">К урокам</button>`;
  app.innerHTML = `${quizCrumbs()}
    <div class="big-card">
      <div class="score">${pct}%</div>
      <div class="pl" style="font-size:20px">${qz.right} из ${qz.qs.length}</div>
      ${mist}
      <div class="btns">${retry}</div>
    </div>`;
}

/* ============================================================
   РЕЖИМ 3: АУДИРОВАНИЕ
   ============================================================ */

function startListen(l){
  const items = shuffle(l.words).slice(0, Math.min(12, l.words.length));
  state.listen = {
    qs: items.map(w => ({w, options: shuffle([w, ...distractors(w, l.words, 'pl', 3)])})),
    idx: 0, right: 0, l
  };
  renderListen();
}
function renderListen(){
  const st = state.listen;
  const q = st.qs[st.idx];
  app.innerHTML = `
    ${crumbs(st.l)}
    <div class="big-card">
      <div class="meta">Аудирование ${st.idx + 1} / ${st.qs.length} · верно: ${st.right}</div>
      <div class="btns"><button class="speak-big" onclick="speak('${esc(q.w.pl)}')">🔊</button></div>
      <div class="meta">Что ты услышала? Выбери фразу</div>
      <div style="margin-top:12px">${q.options.map((o, i) =>
        `<button class="opt" id="opt${i}" onclick="answerListen(${i})">${o.pl}</button>`).join('')}</div>
      <div class="verdict" id="verdict"></div>
    </div>`;
  setTimeout(() => speak(q.w.pl), 250);
}
function answerListen(i){
  const st = state.listen;
  const q = st.qs[st.idx];
  lockOpts();
  const correctIdx = q.options.indexOf(q.w);
  document.getElementById('opt' + correctIdx).classList.add('correct');
  recordAnswer(q.w, q.options[i] === q.w);
  const v = document.getElementById('verdict');
  if (q.options[i] === q.w){

  }

    if (st.idx >= st.qs.length){

      app.innerHTML = `${crumbs(st.l)}
        <div class="big-card">
          <div class="score">${pct}%</div>
          <div class="pl" style="font-size:20px">Аудирование: ${st.right} из ${st.qs.length}</div>
          <div class="btns">
            <button onclick="go('mode','${st.l.id}','listen')">Ещё раз</button>
            <button class="primary" onclick="go('mode','${st.l.id}','build')">Собери фразу →</button>
          </div>
        </div>`;
      return;
    }
    renderListen();
  }, 1500);
}

/* ============================================================
   РЕЖИМ 4: СОБЕРИ ФРАЗУ (с обманками)
   ============================================================ */

function startBuild(l){
  state.phrases = shuffle(l.words.filter(w => isPhrase(w.pl)));
  state.bIdx = 0; state.bDone = 0;
  renderBuild(l);
}
function renderBuild(l){
  const ph = state.phrases[state.bIdx];
  const words = tokens(ph.pl);
  state.target = words;
  state.picked = [];
  /* обманки: 2 лишних слова из других фраз урока */
  const extra = shuffle([...new Set(l.words.flatMap(x => tokens(x.pl)))]
    .filter(t => !words.map(w => w.toLowerCase()).includes(t.toLowerCase())))
    .slice(0, words.length >= 3 ? 2 : 1)
    .map(t => t.toLowerCase());
  const tiles = shuffle([...words.map(w => ({w, real: true})), ...extra.map(w => ({w, real: false}))]);
  state.tiles = tiles;
  app.innerHTML = `
    ${crumbs(l)}
    <div class="big-card">
      <div class="meta">Фраза ${state.bIdx + 1} / ${state.phrases.length} · есть лишние слова!</div>
      <div class="ru" style="margin-top:4px;visibility:visible">${ph.ru}</div>
      <div class="answer-zone" id="zone"></div>
      <div class="tiles" id="tiles">${tiles.map((t, k) =>
        `<span class="tile" id="tile${k}" onclick="pickTile(${k})">${t.w}</span>`).join('')}</div>
      <div class="btns">
        <button class="ghost" onclick="renderBuild(findLesson(state.lessonId))">Сбросить</button>
        <button class="primary" onclick="checkBuild()">Проверить</button>
      </div>
      <div class="verdict" id="verdict"></div>
    </div>`;
}
function pickTile(k){
  const t = state.tiles[k];
  state.picked.push({k, w: t.w});
  document.getElementById('tile' + k).classList.add('used');
  const zone = document.getElementById('zone');
  const el = document.createElement('span');
  el.className = 'tile'; el.textContent = t.w;
  el.onclick = () => {
    state.picked = state.picked.filter(p => p.k !== k);
    document.getElementById('tile' + k).classList.remove('used');
    el.remove();
  };
  zone.appendChild(el);
}
function checkBuild(){
  const got = state.picked.map(p => p.w).join(' ');
  const want = state.target.join(' ');
  const v = document.getElementById('verdict');
  const l = findLesson(state.lessonId);
  if (got === want){
    v.textContent = '✅ Правильно! ' + state.phrases[state.bIdx].pl;
    v.className = 'verdict good';
    speak(state.phrases[state.bIdx].pl);
    recordAnswer(state.phrases[state.bIdx], true);
    state.bDone++;
    setStat(l.id, 'build', state.bDone / state.phrases.length * 100);
    setTimeout(() => {
      state.bIdx++;
      if (state.bIdx >= state.phrases.length){
        app.innerHTML = doneCard(l, 'Все фразы собраны!', 'build', 'match', 'К парам');
        return;
      }
      renderBuild(l);
    }, 1400);
  } else {
    v.textContent = '❌ Пока нет, попробуй ещё (лишние слова не нужны)';
    v.className = 'verdict bad';
  }
}

/* ============================================================
   РЕЖИМ 5: НАЙДИ ПАРЫ
   ============================================================ */

function startMatch(l){
  const ws = shuffle(l.words);
  state.mSets = [];
  for (let i = 0; i < ws.length && state.mSets.length < 3; i += 8){
    const set = ws.slice(i, i + 8);
    if (set.length >= 4) state.mSets.push(set);
  }
  state.mRound = 0; state.mErrors = 0;
  renderMatch(l);
}
function renderMatch(l){
  const set = state.mSets[state.mRound];
  state.mLeft = shuffle(set.map((w, i) => ({w, i})));
  state.mRight = shuffle(set.map((w, i) => ({w, i})));
  state.selL = null; state.selR = null; state.mDone = 0;
  app.innerHTML = `
    ${crumbs(l)}
    <div class="big-card" style="padding:18px 12px">
      <div class="meta">Раунд ${state.mRound + 1} / ${state.mSets.length} · соедини пары · ошибок: <span id="errN">${state.mErrors}</span></div>
      <div class="cols">
        <div>${state.mLeft.map((x, k) =>
          `<button class="opt pair" id="L${k}" onclick="pickPair('L',${k})" style="margin-top:8px">${x.w.pl}</button>`).join('')}</div>
        <div>${state.mRight.map((x, k) =>
          `<button class="opt pair" id="R${k}" onclick="pickPair('R',${k})" style="margin-top:8px">${x.w.ru}</button>`).join('')}</div>
      </div>
    </div>`;
}
function pickPair(side, k){
  const id = side + k;
  const el = document.getElementById(id);
  if (el.classList.contains('done')) return;
  if (side === 'L'){
    if (state.selL !== null) document.getElementById('L' + state.selL).classList.remove('sel');
    state.selL = k; el.classList.add('sel');
    speak(state.mLeft[k].w.pl);
  } else {
    if (state.selR !== null) document.getElementById('R' + state.selR).classList.remove('sel');
    state.selR = k; el.classList.add('sel');
  }
  if (state.selL === null || state.selR === null) return;
  const L = document.getElementById('L' + state.selL), R = document.getElementById('R' + state.selR);
  if (state.mLeft[state.selL].i === state.mRight[state.selR].i){
    L.classList.remove('sel'); R.classList.remove('sel');
    L.classList.add('done'); R.classList.add('done');
    state.mDone++;
    if (state.mDone === state.mSets[state.mRound].length){
      const l = findLesson(state.lessonId);
      state.mRound++;
      if (state.mRound >= state.mSets.length){
        setStat(l.id, 'match', 100);
        app.innerHTML = doneCard(l, `Все пары найдены! Ошибок: ${state.mErrors}`, 'match', 'speak', 'К говорению');
      } else {
        setStat(l.id, 'match', state.mRound / state.mSets.length * 100);
        setTimeout(() => renderMatch(l), 600);
      }
    }
  } else {
    state.mErrors++;
    document.getElementById('errN').textContent = state.mErrors;
    L.classList.add('err'); R.classList.add('err');
    setTimeout(() => {
      L.classList.remove('sel','err'); R.classList.remove('sel','err');
    }, 500);
  }
  state.selL = null; state.selR = null;
}

/* ============================================================
   РЕЖИМ 6: ГОВОРЕНИЕ
   ============================================================ */

function startSpeak(l){
  state.sItems = shuffle(l.words).slice(0, Math.min(20, l.words.length));
  state.sIdx = 0; state.sDone = 0;
  renderSpeak(l);
}
function renderSpeak(l){
  const w = state.sItems[state.sIdx];
  const supported = !!SR;
  app.innerHTML = `
    ${crumbs(l)}
    <div class="big-card">
      <div class="meta">${state.sIdx + 1} / ${state.sItems.length}</div>
      <div class="ru" style="visibility:visible;margin-top:4px">${w.ru}</div>
      <div class="pl" style="margin-top:10px">${w.pl}</div>
      <div class="tr">≈ ${translit(w.pl)}</div>
      <div class="btns">
        ${speakBtns(w.pl)}
      </div>
      <div class="btns">
        ${supported
          ? `<button class="mic" id="micBtn" onclick="listen()">🎙</button>`
          : `<div class="note">Распознавание речи не поддерживается в этом браузере — открой страницу в Chrome.</div>`}
      </div>
      <div class="verdict" id="verdict"></div>
      <div class="heard" id="heard"></div>
      <div class="btns">
        <button class="ghost" onclick="speakNext()">Пропустить →</button>
      </div>
    </div>`;
  if (autoTts) speak(w.pl);
}
function listen(){
  const btn = document.getElementById('micBtn');
  const verdict = document.getElementById('verdict');
  const heard = document.getElementById('heard');
  const target = state.sItems[state.sIdx].pl;
  speechSynthesis.cancel();
  const rec = new SR();
  rec.lang = 'pl-PL';
  rec.interimResults = false;
  rec.maxAlternatives = 3;
  btn.classList.add('listening');
  verdict.textContent = 'Слушаю… говори по-польски';
  verdict.className = 'verdict';
  heard.textContent = '';
  rec.onresult = (e) => {
    btn.classList.remove('listening');
    const alts = Array.from(e.results[0]).map(r => r.transcript);
    let best = alts[0], bestSim = 0;
    for (const a of alts){
      const s = similarity(a, target);
      if (s > bestSim){ bestSim = s; best = a; }
    }
    heard.textContent = 'Услышала: «' + best + '»';
    const l = findLesson(state.lessonId);
    if (bestSim >= 0.8){
      verdict.textContent = '✅ Świetnie! Отличное произношение';
      verdict.className = 'verdict good';
      recordAnswer(state.sItems[state.sIdx], true);
      state.sDone++;
      setStat(l.id, 'speak', state.sDone / state.sItems.length * 100);
      setTimeout(speakNext, 1400);
    } else if (bestSim >= 0.55){
      verdict.textContent = '🟡 Почти! Послушай ещё раз и повтори';
      verdict.className = 'verdict';
      speak(target);
    } else {
      verdict.textContent = '❌ Не получилось распознать, попробуй ещё раз';
      verdict.className = 'verdict bad';
    }
  };
  rec.onerror = (e) => {
    btn.classList.remove('listening');
    verdict.className = 'verdict bad';
    if (e.error === 'not-allowed') verdict.textContent = 'Нет доступа к микрофону — разреши его в настройках браузера';
    else if (e.error === 'no-speech') verdict.textContent = 'Ничего не услышала, попробуй ещё раз';
    else verdict.textContent = 'Ошибка распознавания (' + e.error + '). Нужен интернет.';
  };
  rec.onend = () => btn.classList.remove('listening');
  rec.start();
}
function speakNext(){
  const l = findLesson(state.lessonId);
  state.sIdx++;
  if (state.sIdx >= state.sItems.length){
    app.innerHTML = doneCard(l, 'Урок говорения пройден!', 'speak', null, '');
    return;
  }
  renderSpeak(l);
}

function startReview(){

      </div>`;

}

function renderWeak(){
  const ws = weakWords();

        <div class="pl" style="font-size:20px">Слабых слов нет!</div>

        <div class="btns"><button class="primary" onclick="go('home')">К урокам</button></div>

  }
  const rows = ws.map(w => {

      <span style="color:var(--bad)">✗${st.err}</span> <span style="color:var(--good)">✓${st.ok}</span></div>`;
  }).join('');
  app.innerHTML = `<div class="crumbs" onclick="go('home')">← На главную</div>
    <div class="big-card">

function trainWeak(){

/* ============================================================
   ДИАЛОГИ
   ============================================================ */

function startDialogue(id){
  const d = DIALOGUES.find(x => x.id === id);
  state = {view: 'dialogue', d, turn: 0, errors: 0, opts: null};
  renderDialogue();
}
function dlgOptions(d, turn){
  const correct = d.turns[turn];
  const others = DIALOGUES.filter(x => x !== d).flatMap(x => x.turns.filter(t => t.who === 'u'));
  return shuffle([correct, ...shuffle(others).slice(0, 2)]);
}
function renderDialogue(){
  const d = state.d, turn = state.turn;
  const past = d.turns.slice(0, turn).map(t =>
    `<div class="bub ${t.who === 'u' ? 'me' : 'other'}"><div>${t.pl}</div><div class="bru">${t.ru}</div></div>`).join('');
  const cur = d.turns[turn];
  let controls = '';
  if (!cur){
    setStat(d.id, 'dlg', 100);
    controls = `<div class="verdict good">🎉 Диалог пройден! Ошибок: ${state.errors}</div>
      <div class="btns">
        <button onclick="startDialogue('${d.id}')">Ещё раз</button>
        <button class="primary" onclick="go('home')">К диалогам</button>
      </div>`;
  } else if (cur.who === 'o'){
    controls = `<div class="chat"><div class="bub other"><div>${cur.pl}</div><div class="bru">${cur.ru}</div></div></div>
      <div class="btns">
        ${speakBtns(cur.pl)}
        <button class="primary" onclick="dlgNext()">Дальше →</button>
      </div>`;
  } else {
    if (!state.opts) state.opts = dlgOptions(d, turn);
    controls = `<div class="meta" style="margin-top:14px">Твоя реплика — выбери подходящую:</div>
      ${state.opts.map((o, i) =>
        `<button class="opt" id="opt${i}" onclick="dlgAnswer(${i})">${o.pl}<span class="oru">≈ ${translit(o.pl)}</span></button>`).join('')}
      <div class="verdict" id="verdict"></div>`;
  }
  app.innerHTML = `<div class="crumbs" onclick="go('home')">← Все диалоги</div>
    <div class="big-card" style="text-align:left">
      <div class="pl" style="font-size:18px;text-align:center">${d.emoji} ${d.title}</div>
      <div class="chat">${past}</div>
      <div style="text-align:center">${controls}</div>
    </div>`;
  if (cur && cur.who === 'o' && autoTts) setTimeout(() => speak(cur.pl), 200);
}
function dlgNext(){
  state.turn++;
  state.opts = null;
  renderDialogue();
}
function dlgAnswer(i){
  const correct = state.opts[i] === state.d.turns[state.turn];
  bumpDay();
  if (correct){
    speak(state.d.turns[state.turn].pl);
    dlgNext();
  } else {
    state.errors++;
    const el = document.getElementById('opt' + i);
    el.classList.add('wrong');
    const v = document.getElementById('verdict');
    v.textContent = '❌ Эта реплика из другого разговора, попробуй ещё';
    v.className = 'verdict bad';
  }
}

/* ============================================================
   ЧИСЛА НА СЛУХ
   ============================================================ */

function genNumbers(){
  const qs = [];
  for (let i = 0; i < 15; i++){
    const kind = ['num', 'num', 'price', 'time'][i % 4];
    if (kind === 'num'){
      const n = 1 + Math.floor(Math.random() * 199);
      qs.push({kind, say: numToPl(n), show: String(n), n});
    } else if (kind === 'price'){
      const n = (1 + Math.floor(Math.random() * 100)) * 5;
      qs.push({kind, say: zloty(n), show: n + ' zł', n});
    } else {
      const h = 1 + Math.floor(Math.random() * 12);
      const m = [0, 5, 10, 15, 20, 30, 40, 45, 50][Math.floor(Math.random() * 9)];
      qs.push({kind, say: 'Jest ' + HOURS_PL[h] + (m ? ' ' + numToPl(m) : ''), show: h + ':' + String(m).padStart(2, '0'), h, m});
    }
  }
  return qs;
}
const NUM_HINTS = {num: 'число', price: 'цена в злотых', time: 'время (например 5:30)'};
function startNumbers(){
  state.num = {qs: genNumbers(), idx: 0, right: 0};
  renderNumbers();
}
function renderNumbers(){
  const st = state.num;
  const q = st.qs[st.idx];
  app.innerHTML = `<div class="crumbs" onclick="go('home')">← На главную</div>
    <div class="big-card">
      <div class="meta">Числа на слух ${st.idx + 1} / ${st.qs.length} · верно: ${st.right} <span class="badge">${NUM_HINTS[q.kind]}</span></div>
      <div class="btns">
        <button class="speak-big" onclick="speak('${esc(q.say)}')">🔊</button>
        <button class="speak-btn" onclick="speak('${esc(q.say)}', 0.55)" title="Медленно">🐢</button>
      </div>
      <input class="answer" id="numInput" inputmode="numeric" autocomplete="off" placeholder="запиши цифрами${q.kind === 'time' ? ', например 5:30' : ''}">
      <div class="btns"><button class="primary" onclick="answerNumber()">Проверить</button></div>
      <div class="verdict" id="verdict"></div>
    </div>`;
  const inp = document.getElementById('numInput');
  inp.focus();
  inp.onkeydown = e => { if (e.key === 'Enter') answerNumber(); };
  setTimeout(() => speak(q.say), 250);
}
function answerNumber(){
  const st = state.num;
  const q = st.qs[st.idx];
  const inp = document.getElementById('numInput');
  if (!inp || inp.disabled) return;
  inp.disabled = true;
  const digits = (inp.value.match(/\d+/g) || []).map(Number);
  let ok;
  if (q.kind === 'time') ok = digits.length >= 1 && digits[0] === q.h && (digits[1] || 0) === q.m;
  else ok = digits.length === 1 && digits[0] === q.n;
  bumpDay();
  const v = document.getElementById('verdict');
  if (ok){
    st.right++;
    v.textContent = '✅ ' + q.show + ' — ' + q.say;
    v.className = 'verdict good';
  } else {
    v.textContent = '❌ Это было ' + q.show + ' — ' + q.say;
    v.className = 'verdict bad';
  }
  setTimeout(() => {
    st.idx++;
    if (st.idx >= st.qs.length){
      const pct = Math.round(st.right / st.qs.length * 100);
      setStat('numbers', 'numbers', pct);
      app.innerHTML = `<div class="crumbs" onclick="go('home')">← На главную</div>
        <div class="big-card">
          <div class="score">${pct}%</div>
          <div class="pl" style="font-size:20px">Числа: ${st.right} из ${st.qs.length}</div>
          <div class="btns">
            <button onclick="go('numbers')">Ещё раз</button>
            <button class="primary" onclick="go('home')">К урокам</button>
          </div>
        </div>`;
      return;
    }
    renderNumbers();
  }, ok ? 1300 : 2400);
}

/* ============================================================
   ГРАММАТИКА
   ============================================================ */

function startGrammar(){
  state.gr = {qs: shuffle(GRAMMAR).slice(0, 15), idx: 0, right: 0};
  renderGrammar();
}
function renderGrammar(){
  const st = state.gr;
  const q = st.qs[st.idx];
  const opts = shuffle(q.o.map((o, i) => i));
  state.gr.optOrder = opts;
  app.innerHTML = `<div class="crumbs" onclick="go('home')">← На главную</div>
    <div class="big-card">
      <div class="meta">Грамматика ${st.idx + 1} / ${st.qs.length} · верно: ${st.right}</div>
      <div class="gap-phrase" style="font-size:21px">${q.q}</div>
      <div style="margin-top:12px">${opts.map((oi, k) =>
        `<button class="opt" id="opt${k}" onclick="answerGrammar(${k})" style="text-align:center">${q.o[oi]}</button>`).join('')}</div>
      <div class="note-inline" id="grNote" style="display:none"></div>
    </div>`;
}
function answerGrammar(k){
  const st = state.gr;
  const q = st.qs[st.idx];
  lockOpts();
  const chosen = q.o[st.optOrder[k]];
  const correctK = st.optOrder.findIndex(oi => q.o[oi] === q.a);
  document.getElementById('opt' + correctK).classList.add('correct');
  const ok = chosen === q.a;
  if (ok) st.right++;
  else document.getElementById('opt' + k).classList.add('wrong');
  bumpDay();
  const note = document.getElementById('grNote');
  note.textContent = '💡 ' + q.note;
  note.style.display = 'block';
  speak(q.q.replace('___', q.a).replace(/\(.*?\)/, '').trim());
  setTimeout(() => {
    st.idx++;
    if (st.idx >= st.qs.length){
      const pct = Math.round(st.right / st.qs.length * 100);
      setStat('grammar', 'grammar', pct);
      app.innerHTML = `<div class="crumbs" onclick="go('home')">← На главную</div>
        <div class="big-card">
          <div class="score">${pct}%</div>
          <div class="pl" style="font-size:20px">Грамматика: ${st.right} из ${st.qs.length}</div>
          <div class="btns">
            <button onclick="go('grammar')">Ещё раз</button>
            <button class="primary" onclick="go('home')">К урокам</button>
          </div>
        </div>`;
      return;
    }
    renderGrammar();
  }, ok ? 1800 : 2800);
}

/* ============================================================ */

renderAutoToggle();
go('home');

if ('serviceWorker' in navigator && location.protocol !== 'file:'){
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
